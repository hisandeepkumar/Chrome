<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>WinLauncher</title>
    <link rel="manifest" href="/static/manifest.json">
    <link rel="stylesheet" href="/static/style.css">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
</head>
<body>
    <button id="fullscreenBtn" class="fullscreen-btn">⛶</button>

    <div id="mainView">
        <div id="appContainer" class="app-container"></div>
        <div id="pageIndicators" class="page-indicators"></div>
    </div>

    <!-- Edit Overlay -->
    <div id="editView" class="edit-overlay" style="display:none;">
        <div class="edit-container glass">
            <div class="edit-header">
                <h2>✏️ Edit Shortcuts</h2>
                <button id="closeEdit" class="close-btn">&times;</button>
            </div>
            <!-- Page Tabs (draggable) -->
            <div id="pageTabs" class="page-tabs"></div>
            <!-- Page Content -->
            <div id="pageContent" class="edit-page-content">
                <div id="editList" class="edit-list"></div>
            </div>
            <div class="edit-footer">
                <button id="addPageBtn" class="glass-btn">➕ Add Page</button>
                <button id="addMoreBtn" class="glass-btn primary">➕ Add Shortcut</button>
            </div>
        </div>
    </div>

    <!-- Grid Settings Modal (no cols/rows) -->
    <div id="gridSettingsModal" class="modal" style="display:none;">
        <div class="modal-content glass" style="max-width:450px;">
            <span class="close-btn" id="closeSettings">&times;</span>
            <h2>⚙️ Grid Settings</h2>
            <div class="settings-group">
                <label>Icon Size (px)</label>
                <input type="range" id="iconSize" min="40" max="120" value="64">
                <span id="iconSizeVal">64</span>
            </div>
            <div class="settings-group">
                <label>Glow Size</label>
                <input type="range" id="glowSize" min="0" max="60" value="20">
                <span id="glowSizeVal">20</span>
            </div>
            <div class="settings-group">
                <label>Background Blur</label>
                <input type="range" id="bgBlur" min="0" max="20" value="0" step="0.5">
                <span id="bgBlurVal">0</span>
            </div>
            <div class="settings-group">
                <label>Background Type</label>
                <select id="bgType">
                    <option value="color">Color</option>
                    <option value="image">Image</option>
                    <option value="video">Video</option>
                </select>
            </div>
            <div class="settings-group" id="bgColorGroup">
                <label>Background Color</label>
                <input type="color" id="bgColor" value="#000000">
            </div>
            <div class="settings-group" id="bgFileGroup" style="display:none;">
                <label>Upload Image/Video</label>
                <input type="file" id="bgFile" accept="image/*,video/*">
            </div>
            <button id="saveSettingsBtn" class="glass-btn primary">Save Settings</button>
            <div style="display:flex; gap:10px; margin-top:15px;">
                <button id="exportBtn" class="glass-btn">📤 Export</button>
                <button id="importBtn" class="glass-btn">📥 Import</button>
                <input type="file" id="importFileInput" accept=".sb,application/json" style="display:none;">
            </div>
            <p id="settingsMsg" style="color:#ff6b6b; margin-top:10px;"></p>
        </div>
    </div>

    <!-- Add/Edit Modal -->
    <div id="addModal" class="modal" style="display:none;">
        <div class="modal-content glass">
            <span class="close-btn" id="closeModal">&times;</span>
            <h2 id="modalTitle">Edit Shortcut</h2>
            <input type="hidden" id="editId">
            <div class="icon-upload-section">
                <div id="currentIconDisplay" class="current-icon glow"></div>
                <label class="file-upload-label">
                    <span>🖼️ Change Icon</span>
                    <input type="file" id="iconFile" accept="image/png,image/jpeg,image/svg+xml">
                </label>
                <div id="iconPreview" class="icon-preview" style="display:none;"></div>
            </div>
            <input type="text" id="appName" placeholder="Shortcut Name (optional)">
            <input type="text" id="appPath" placeholder="Path / URL / Command">
            <button id="saveAppBtn" class="glass-btn primary">Save</button>
            <p id="modalMsg" style="color:#ff6b6b; margin-top:10px;"></p>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
