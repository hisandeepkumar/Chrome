<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>WinLauncher</title>
    <link rel="manifest" href="/static/manifest.json">
    <link rel="stylesheet" href="/static/style.css">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1c1c1e">
</head>
<body>
    <div class="container">
        <header>
            <h1>🚀 WinLauncher</h1>
            <p class="subtitle">Tap to launch</p>
        </header>

        <!-- Main Grid View -->
        <div id="mainView">
            <div id="appGrid" class="grid">
                <!-- Apps will be rendered here -->
                <!-- Edit button will be appended as last item -->
            </div>
        </div>

        <!-- Edit List View (Overlay) -->
        <div id="editView" class="edit-overlay" style="display:none;">
            <div class="edit-container glass">
                <div class="edit-header">
                    <h2>✏️ Edit Shortcuts</h2>
                    <button id="closeEdit" class="close-btn">&times;</button>
                </div>
                <div id="editList" class="edit-list">
                    <!-- List items will be rendered here -->
                </div>
                <div class="edit-footer">
                    <button id="addMoreBtn" class="glass-btn primary">➕ Add More Shortcut</button>
                </div>
            </div>
        </div>

        <!-- Modal for Add/Edit (Popup) -->
        <div id="addModal" class="modal">
            <div class="modal-content glass">
                <span class="close-btn" id="closeModal">&times;</span>
                <h2 id="modalTitle">Edit Shortcut</h2>
                <input type="hidden" id="editId" value="">
                
                <!-- Icon Upload -->
                <div class="icon-upload-section">
                    <div id="currentIconDisplay" class="current-icon">
                        <!-- Will show emoji or image -->
                    </div>
                    <label class="file-upload-label">
                        <span>🖼️ Change Icon</span>
                        <input type="file" id="iconFile" accept="image/png, image/jpeg, image/svg+xml">
                    </label>
                    <div id="iconPreview" class="icon-preview" style="display:none;"></div>
                </div>

                <input type="text" id="appName" placeholder="Shortcut Name">
                <input type="text" id="appPath" placeholder="Path / URL / Command">
                <button id="saveAppBtn" class="glass-btn primary">Save</button>
                <p id="modalMsg" style="color: #ff6b6b; margin-top: 10px;"></p>
            </div>
        </div>

    </div>

    <script src="/static/script.js"></script>
</body>
</html>
