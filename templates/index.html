<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>WinLauncher</title>
    <link rel="manifest" href="/static/manifest.json">
    <link rel="stylesheet" href="/static/style.css">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
</head>
<body>
    <button id="fullscreenBtn" class="fullscreen-btn">⛶</button>

    <div id="mainView">
        <div id="appContainer" class="app-container"></div>
        <div id="pageIndicators" class="page-indicators"></div>
        <!-- Dock -->
        <div id="dockContainer" class="dock-container" style="display:none;"></div>
    </div>

    <!-- Edit Overlay -->
    <div id="editView" class="edit-overlay" style="display:none;">
        <div class="edit-container glass">
            <div class="edit-header">
                <h2>✏️ Edit Shortcuts</h2>
                <button id="closeEdit" class="close-btn">&times;</button>
            </div>
            <div id="editList" class="edit-list"></div>
            <div class="edit-footer">
                <button id="addMoreBtn" class="glass-btn primary">➕ Add More</button>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settingsModal" class="modal" style="display:none;">
        <div class="modal-content glass" style="max-width:700px; max-height:90vh; overflow-y:auto;">
            <span class="close-btn" id="closeSettings">&times;</span>
            <h2 style="margin-bottom:15px;">⚙️ Settings</h2>
            <!-- Tabs -->
            <div class="settings-tabs">
                <button class="tab-btn active" data-tab="grid">Grid</button>
                <button class="tab-btn" data-tab="effects">Effects</button>
                <button class="tab-btn" data-tab="wallpaper">Wallpaper</button>
                <button class="tab-btn" data-tab="dock">Dock</button>
                <button class="tab-btn" data-tab="labels">Labels</button>
                <button class="tab-btn" data-tab="presets">Presets</button>
                <button class="tab-btn" data-tab="backup">Backup</button>
            </div>
            <div class="tab-content" id="tabGrid">
                <div style="display:flex; flex-wrap:wrap; gap:20px;">
                    <div style="flex:1; min-width:200px;">
                        <h3>Portrait</h3>
                        <div class="settings-group"><label>Columns</label><input type="number" id="portraitCols" min="1" max="8" value="3"></div>
                        <div class="settings-group"><label>Rows</label><input type="number" id="portraitRows" min="1" max="8" value="4"></div>
                        <div class="settings-group"><label>Icon Size (px)</label><input type="range" id="portraitIconSize" min="40" max="200" value="64"><span id="portraitIconSizeVal">64</span></div>
                        <div class="settings-group"><label>Icon Shape</label>
                            <select id="portraitIconShape">
                                <option value="square">Square</option>
                                <option value="rounded" selected>Rounded</option>
                                <option value="circle">Circle</option>
                                <option value="squircle">Squircle</option>
                            </select>
                        </div>
                        <div class="settings-group"><label>Label Font Size</label><input type="number" id="portraitLabelFontSize" min="8" max="24" value="12"></div>
                        <div class="settings-group"><label>Horizontal Gap</label><input type="number" id="portraitHGap" min="0" max="40" value="16"></div>
                        <div class="settings-group"><label>Vertical Gap</label><input type="number" id="portraitVGap" min="0" max="40" value="16"></div>
                        <div class="settings-group"><label>Padding (all sides)</label><input type="number" id="portraitPadding" min="0" max="200" value="100"></div>
                        <div class="settings-group"><label>Grid Alignment</label>
                            <select id="portraitGridAlignment">
                                <option value="center">Center</option>
                                <option value="left">Left</option>
                                <option value="right">Right</option>
                            </select>
                        </div>
                    </div>
                    <div style="flex:1; min-width:200px;">
                        <h3>Landscape</h3>
                        <div class="settings-group"><label>Columns</label><input type="number" id="landscapeCols" min="1" max="8" value="4"></div>
                        <div class="settings-group"><label>Rows</label><input type="number" id="landscapeRows" min="1" max="8" value="3"></div>
                        <div class="settings-group"><label>Icon Size (px)</label><input type="range" id="landscapeIconSize" min="40" max="200" value="64"><span id="landscapeIconSizeVal">64</span></div>
                        <div class="settings-group"><label>Icon Shape</label>
                            <select id="landscapeIconShape">
                                <option value="square">Square</option>
                                <option value="rounded" selected>Rounded</option>
                                <option value="circle">Circle</option>
                                <option value="squircle">Squircle</option>
                            </select>
                        </div>
                        <div class="settings-group"><label>Label Font Size</label><input type="number" id="landscapeLabelFontSize" min="8" max="24" value="12"></div>
                        <div class="settings-group"><label>Horizontal Gap</label><input type="number" id="landscapeHGap" min="0" max="40" value="16"></div>
                        <div class="settings-group"><label>Vertical Gap</label><input type="number" id="landscapeVGap" min="0" max="40" value="16"></div>
                        <div class="settings-group"><label>Padding (all sides)</label><input type="number" id="landscapePadding" min="0" max="200" value="100"></div>
                        <div class="settings-group"><label>Grid Alignment</label>
                            <select id="landscapeGridAlignment">
                                <option value="center">Center</option>
                                <option value="left">Left</option>
                                <option value="right">Right</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>
            <div class="tab-content" id="tabEffects" style="display:none;">
                <div class="settings-group"><label>Glow Color</label><input type="color" id="glowColor" value="#ffffff"></div>
                <div class="settings-group"><label>Glow Brightness</label><input type="range" id="glowBrightness" min="0" max="100" value="50"><span id="glowBrightnessVal">50</span></div>
                <div class="settings-group"><label>Glow Radius</label><input type="range" id="glowRadius" min="0" max="60" value="20"><span id="glowRadiusVal">20</span></div>
                <div class="settings-group"><label>Shadow Strength</label><input type="range" id="shadowStrength" min="0" max="100" value="0"><span id="shadowStrengthVal">0</span></div>
                <div class="settings-group"><label>Shadow Blur</label><input type="range" id="shadowBlur" min="0" max="40" value="0"><span id="shadowBlurVal">0</span></div>
                <div class="settings-group"><label>Border Radius</label><input type="range" id="borderRadius" min="0" max="50" value="16"><span id="borderRadiusVal">16</span></div>
                <div class="settings-group"><label>Hover Scale</label><input type="number" id="hoverScale" min="1" max="1.5" step="0.01" value="1.05"></div>
                <div class="settings-group"><label>Tap Animation</label><input type="checkbox" id="tapAnimation" checked></div>
                <div class="preview-card">
                    <div id="previewApp" class="app-card">
                        <span class="icon" style="font-size:2.5rem;">🚀</span>
                        <span class="name">Preview</span>
                    </div>
                </div>
            </div>
            <div class="tab-content" id="tabWallpaper" style="display:none;">
                <div class="settings-group"><label>Type</label>
                    <select id="wallpaperType">
                        <option value="color">Color</option>
                        <option value="image">Image</option>
                        <option value="video">Video</option>
                    </select>
                </div>
                <div class="settings-group" id="wallpaperColorGroup"><label>Color</label><input type="color" id="wallpaperColor" value="#000000"></div>
                <div class="settings-group" id="wallpaperFileGroup" style="display:none;"><label>Upload Image/Video</label><input type="file" id="wallpaperFile" accept="image/*,video/*"></div>
                <div class="settings-group"><label>Dim Level</label><input type="range" id="wallpaperDim" min="0" max="100" value="0"><span id="wallpaperDimVal">0</span></div>
                <div class="settings-group"><label>Blur</label><input type="range" id="wallpaperBlur" min="0" max="20" step="0.5" value="0"><span id="wallpaperBlurVal">0</span></div>
                <div class="settings-group"><label>Zoom</label><input type="range" id="wallpaperZoom" min="50" max="200" value="100"><span id="wallpaperZoomVal">100</span></div>
                <div class="settings-group"><label>Brightness</label><input type="range" id="wallpaperBrightness" min="0" max="200" value="100"><span id="wallpaperBrightnessVal">100</span></div>
                <div class="settings-group"><label>Opacity</label><input type="range" id="wallpaperOpacity" min="0" max="100" value="100"><span id="wallpaperOpacityVal">100</span></div>
            </div>
            <div class="tab-content" id="tabDock" style="display:none;">
                <div class="settings-group"><label>Enable Dock</label><input type="checkbox" id="dockEnabled"></div>
                <div class="settings-group"><label>Select Dock Icons (drag to reorder later)</label>
                    <div id="dockIconSelector" style="display:flex; flex-wrap:wrap; gap:8px; margin-bottom:10px;"></div>
                </div>
                <div class="settings-group"><label>Background Blur</label><input type="range" id="dockBlur" min="0" max="30" value="20"><span id="dockBlurVal">20</span></div>
                <div class="settings-group"><label>Opacity</label><input type="range" id="dockOpacity" min="0" max="100" value="80"><span id="dockOpacityVal">80</span></div>
                <div class="settings-group"><label>Icon Size</label><input type="range" id="dockIconSize" min="30" max="80" value="48"><span id="dockIconSizeVal">48</span></div>
                <div class="settings-group"><label>Auto Hide</label><input type="checkbox" id="dockAutoHide"></div>
            </div>
            <div class="tab-content" id="tabLabels" style="display:none;">
                <div class="settings-group"><label>Hide App Names</label><input type="checkbox" id="labelsHide"></div>
                <div class="settings-group"><label>Show App Names</label><input type="checkbox" id="labelsShow" checked></div>
                <div class="settings-group"><label>Label Color</label><input type="color" id="labelColor" value="#ffffff"></div>
                <div class="settings-group"><label>Label Shadow</label><input type="checkbox" id="labelShadow"></div>
            </div>
            <div class="tab-content" id="tabPresets" style="display:none;">
                <h3>Built‑in Presets</h3>
                <div style="display:flex; flex-wrap:wrap; gap:10px; margin-bottom:15px;">
                    <button class="preset-btn" data-preset="Apple Clean">Apple Clean</button>
                    <button class="preset-btn" data-preset="Samsung OneUI">Samsung OneUI</button>
                    <button class="preset-btn" data-preset="Windows 11">Windows 11</button>
                    <button class="preset-btn" data-preset="AMOLED Black">AMOLED Black</button>
                    <button class="preset-btn" data-preset="RGB Gaming">RGB Gaming</button>
                    <button class="preset-btn" data-preset="Minimal">Minimal</button>
                    <button class="preset-btn" data-preset="Large Icons">Large Icons</button>
                    <button class="preset-btn" data-preset="Compact Grid">Compact Grid</button>
                </div>
                <div class="settings-group"><label>Current Preset</label><span id="currentPresetLabel">default</span></div>
                <button id="resetToDefaultBtn" class="glass-btn" style="margin-top:10px;">Reset to Default</button>
            </div>
            <div class="tab-content" id="tabBackup" style="display:none;">
                <button id="exportBtn" class="glass-btn primary">⬇️ Download Setup (.wlbackup)</button>
                <div style="margin-top:15px;">
                    <label class="file-upload-label" style="display:inline-block; padding:12px 24px; border-radius:40px; background:rgba(255,255,255,0.1); cursor:pointer;">
                        📂 Import Setup
                        <input type="file" id="importFile" accept=".wlbackup" style="display:none;">
                    </label>
                </div>
                <div id="backupMsg" style="margin-top:10px; color:#ff6b6b;"></div>
            </div>

            <button id="saveSettingsBtn" class="glass-btn primary" style="margin-top:20px; width:100%;">Save Settings</button>
            <p id="settingsMsg" style="color:#ff6b6b; margin-top:10px;"></p>
        </div>
    </div>

    <!-- Add/Edit Modal -->
    <div id="addModal" class="modal" style="display:none;">
        <div class="modal-content glass">
            <span class="close-btn" id="closeModal">&times;</span>
            <h2 id="modalTitle">Edit Shortcut</h2>
            <input type="hidden" id="editId">
            <div class="icon-upload-section">
                <div id="currentIconDisplay" class="current-icon glow"></div>
                <label class="file-upload-label">
                    <span>🖼️ Change Icon</span>
                    <input type="file" id="iconFile" accept="image/png,image/jpeg,image/svg+xml">
                </label>
                <div id="iconPreview" class="icon-preview" style="display:none;"></div>
            </div>
            <input type="text" id="appName" placeholder="Shortcut Name (optional)">
            <input type="text" id="appPath" placeholder="Path / URL / Command">
            <button id="saveAppBtn" class="glass-btn primary">Save</button>
            <p id="modalMsg" style="color:#ff6b6b; margin-top:10px;"></p>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
